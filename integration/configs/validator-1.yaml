validator:
  name: "validator-1"
  rpc_url: "http://mock-solana:8899?validator=validator-1"
  public_ip_service_urls: ["http://mock-solana:8899/public-ip"]
  identities:
    active: "/tmp/active-identity.json"
    passive: "/tmp/passive-identity-1.json"

cluster:
  name: "mainnet-beta"
  rpc_urls: ["http://mock-cluster:8899"]

prometheus:
  port: 9090
  static_labels:
    environment: "integration-test"
    validator: "validator-1"

failover:
  poll_interval_duration: "3s"
  leaderless_samples_threshold: 3  # 3 × 3s = 9s before failover

  self_healthy:
    minimum_duration: "5s"       # short for fast integration tests (default is 45s)
    poll_interval_duration: "2s"

  # When becoming active, tell the mock server so getIdentity returns the active pubkey.
  # isSelfActive() then confirms success and the metrics role flips to "active".
  active:
    command: "curl"
    args:
      - "-sf"
      - "-X"
      - "POST"
      - "-H"
      - "Content-Type: application/json"
      - "-d"
      - '{"action":"set_active","target":"{{ .SelfName }}"}'
      - "http://mock-solana:8899/action"

  # When becoming passive, tell the mock server. If this validator was active, the mock
  # clears the active slot; getIdentity then returns the passive pubkey confirming the transition.
  passive:
    command: "curl"
    args:
      - "-sf"
      - "-X"
      - "POST"
      - "-H"
      - "Content-Type: application/json"
      - "-d"
      - '{"action":"set_passive","target":"{{ .SelfName }}"}'
      - "http://mock-solana:8899/action"

  # Peers: all HA peers excluding this node (self is added automatically at startup).
  # IPs must match the public IPs returned by the mock /public-ip service.
  peers:
    validator-2:
      ip: "10.0.0.101"
    validator-3:
      ip: "10.0.0.102"
