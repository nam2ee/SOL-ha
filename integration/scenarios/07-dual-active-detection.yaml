name: dual-active-detection
description: >
  Two validators are simultaneously set to active identity, simulating a
  split-brain condition. The dual-active guard should detect this within
  one poll cycle and the lower-priority node (higher IP rank) should
  automatically step down, leaving exactly one active validator.

initial_state:
  active_validator: validator-1

steps:
  - name: assert initial state
    action: assert
    timeout: 30s
    active_count: 1
    state:
      validator-1:
        role: active
      validator-2:
        role: passive
      validator-3:
        role: passive

  - name: force validator-3 active (simulating split-brain)
    action: add_active
    target: validator-3

  - name: wait for dual-active detection to trigger
    action: wait
    duration: 10s

  - name: dual-active resolved — only one active remains
    action: assert
    timeout: 20s
    active_count: 1
