name: unhealthy-peer-skipped
description: >
  A passive validator whose local RPC reports unhealthy must not become active
  during a failover, even if it is visible in gossip. Only the healthy passive
  validator should take over. This exercises both the isSelfUnhealthy() gate
  and the self_healthy minimum-duration streak requirement.

initial_state:
  active_validator: validator-1

steps:
  - name: assert initial state
    action: assert
    timeout: 30s
    active_count: 1
    state:
      validator-1:
        role: active

  - name: mark validator-2 unhealthy
    action: set_unhealthy
    target: validator-2

  - name: wait for unhealthy state to register in validator-2 health tracker
    action: wait
    duration: 8s  # > self_healthy.minimum_duration (5s); ensures streak is reset

  - name: disconnect active validator
    action: disconnect
    target: validator-1

  - name: only healthy validator-3 becomes active
    action: assert
    timeout: 45s
    active_count: 1
    state:
      validator-2:
        role: passive  # unhealthy — must not become active
      validator-3:
        role: active

  - name: restore validator-2 health
    action: set_healthy
    target: validator-2
