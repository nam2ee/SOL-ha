name: split-brain-reconnect
description: >
  The active validator disconnects long enough for a passive to take over.
  Then the original active reconnects with a stale active identity.
  The dual-active guard should detect the conflict and the lower-priority
  node should step down, resolving the split-brain automatically.

initial_state:
  active_validator: validator-1

steps:
  - name: assert initial state
    action: assert
    timeout: 30s
    active_count: 1
    state:
      validator-1:
        role: active
      validator-2:
        role: passive
      validator-3:
        role: passive

  - name: disconnect active validator
    action: disconnect
    target: validator-1

  - name: wait for a passive to take over
    action: assert
    timeout: 45s
    active_count: 1
    state:
      validator-1:
        role: passive

  - name: simulate original leader reconnecting with stale active identity
    action: add_active
    target: validator-1

  - name: reconnect validator-1 back to gossip
    action: reconnect
    target: validator-1

  - name: wait for dual-active detection to trigger
    action: wait
    duration: 10s

  - name: split-brain resolved — only one active remains
    action: assert
    timeout: 20s
    active_count: 1
