name: Update Demo GIFs

# Regenerates docs/passive-node.gif and docs/active-node.gif on every push to master
# and commits them back. The paths-ignore on docs/** prevents the bot commit from
# triggering another run.
on:
  push:
    branches: [master]
    paths-ignore:
      - "docs/**"

jobs:
  generate:
    name: Generate failover GIFs
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go (for VHS install)
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: false

      - name: Install VHS and dependencies
        run: |
          # VHS requires ffmpeg and ttyd at runtime
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          go install github.com/charmbracelet/vhs@latest

      - name: Start integration environment
        working-directory: integration
        env:
          COMPOSE_BAKE: "true"
        run: |
          docker compose up --build -d
          echo "Waiting 30s for services to be ready..."
          sleep 30

      - name: Generate GIFs
        run: |
          mkdir -p docs
          vhs integration/tapes/passive-node.tape
          vhs integration/tapes/active-node.tape

      - name: Teardown integration environment
        if: always()
        working-directory: integration
        run: docker compose down --volumes --remove-orphans

      - name: Commit GIFs if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "GIFs unchanged — nothing to commit."
          else
            git commit -m "docs: update failover demo GIFs [skip ci]"
            git push
